name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          # Refresh the repo (and thus deploy.sh itself) before running it, so a
          # run always executes the current deploy script instead of the stale
          # on-disk copy from the previous deploy.
          script: |
            set -e
            cd ${{ secrets.VPS_APP_DIR }}
            git pull origin main
            bash deploy.sh
          debug: true
